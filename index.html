<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тетрис с рекламой</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background: var(--tg-theme-bg-color, #111);
            font-family: sans-serif;
            color: var(--tg-theme-text-color, white);
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        .menu, .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 460px;
            padding: 10px 5px 0 5px;
            margin-top: env(safe-area-inset-top, 0);
        }
        .menu.hidden, .game-wrapper.hidden {
            display: none;
        }
        .menu h1 {
            font-size: 48px;
            margin: 20px 0;
        }
        .menu button {
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 24px;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
        }

        /* Верхняя панель: SCORE и LVL ближе к центру, пауза справа */
        .top-panel {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            gap: 8px;
            margin-bottom: 5px;
            height: 36px;
            padding-left: 20px;   /* отступ слева для смещения к центру */
            padding-right: 10px;
        }
        .info-block {
            flex: 0 0 auto;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-width: 45px;       /* фиксированная ширина для компактности */
            padding: 0 5px;
            backdrop-filter: blur(2px);
        }
        .pause-block {
            margin-left: auto;      /* прижимает кнопку паузы к правому краю */
            height: 100%;
            display: flex;
            align-items: center;
        }
        .info-label {
            font-size: 8px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1;
            margin-bottom: 2px;
        }
        .info-value {
            font-size: 14px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #4CAF50);
            line-height: 1;
        }
        #pause-button {
            width: 32px;
            height: 32px;
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            border-radius: 6px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
        }

        /* Контейнер поля + NEXT (поле центрируется, NEXT уменьшен и смещён правее) */
        .board-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            padding-left: 10px;     /* дополнительный сдвиг вправо для центрирования поля */
        }
        canvas#board {
            background: #000;
            border: 2px solid var(--tg-theme-hint-color, #555);
            width: 300px;
            height: 600px;
            touch-action: none;
        }
        .next-piece {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            margin-left: auto;       /* прижимает NEXT к правому краю */
        }
        .next-label {
            font-size: 9px;          /* чуть меньше */
            text-transform: uppercase;
            opacity: 0.8;
        }
        canvas#nextCanvas {
            background: #000;
            border: 2px solid var(--tg-theme-hint-color, #555);
            width: 60px;             /* уменьшенный размер */
            height: 60px;
        }

        /* Панель управления (крест): поворот сверху, движение снизу */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            margin-top: 12px;
            margin-bottom: 5px;
        }
        .ctrl-row {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            border-radius: 16px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .ctrl-btn:active {
            opacity: 0.7;
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }

        /* Модальные окна */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }
        .overlay.hidden {
            display: none;
        }
        .modal {
            background: var(--tg-theme-bg-color, #333);
            color: var(--tg-theme-text-color, white);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid var(--tg-theme-hint-color, #555);
            width: 280px;
            max-width: 90%;
        }
        .modal h2 {
            margin-top: 0;
        }
        .modal button {
            margin: 8px 0;
            width: 100%;
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .modal button:last-child {
            margin-bottom: 0;
        }

        /* Адаптация для узких экранов */
        @media (max-width: 420px) {
            .game-wrapper {
                max-width: 360px;
            }
            canvas#board {
                width: 250px;
                height: 500px;
            }
            canvas#nextCanvas {
                width: 50px;          /* ещё меньше на узких экранах */
                height: 50px;
            }
            .ctrl-btn {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }
        }
        @media (max-width: 350px) {
            canvas#board {
                width: 220px;
                height: 440px;
            }
            canvas#nextCanvas {
                width: 45px;
                height: 45px;
            }
            .ctrl-btn {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Меню -->
    <div id="menu" class="menu">
        <h1>Тетрис</h1>
        <button id="play-button">Играть</button>
    </div>

    <!-- Игровой экран -->
    <div id="game-wrapper" class="game-wrapper hidden">
        <!-- Верхняя панель (SCORE и LVL ближе к центру) -->
        <div class="top-panel">
            <div class="info-block">
                <div class="info-label">SCORE</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-block">
                <div class="info-label">LVL</div>
                <div class="info-value" id="level">0</div>
            </div>
            <div class="pause-block">
                <button id="pause-button" title="Пауза">⏸</button>
            </div>
        </div>

        <!-- Поле (центрировано) + NEXT (уменьшен и прижат вправо) -->
        <div class="board-container">
            <canvas id="board" width="300" height="600"></canvas>
            <div class="next-piece">
                <div class="next-label">NEXT</div>
                <canvas id="nextCanvas" width="100" height="100"></canvas>
            </div>
        </div>

        <!-- Кнопки крестом: поворот сверху, движение снизу -->
        <div class="controls">
            <div class="ctrl-row"></div> <!-- пустой ряд для отступа -->
            <div class="ctrl-row">
                <button class="ctrl-btn" id="rotate">↻</button>
            </div>
            <div class="ctrl-row">
                <button class="ctrl-btn" id="move-left">←</button>
                <button class="ctrl-btn" id="soft-drop">↓</button>
                <button class="ctrl-btn" id="move-right">→</button>
            </div>
        </div>
    </div>

    <!-- Модалка Game Over -->
    <div id="game-over" class="overlay hidden">
        <div class="modal">
            <h2>Игра окончена</h2>
            <p>Счёт: <span id="final-score"></span></p>
            <button id="watch-ad">Смотреть рекламу и продолжить</button>
            <button id="restart">Начать заново</button>
        </div>
    </div>

    <!-- Модалка паузы -->
    <div id="pause-menu" class="overlay hidden">
        <div class="modal">
            <h2>Пауза</h2>
            <button id="resume-button">Продолжить</button>
            <button id="exit-to-menu">Выйти в меню</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
