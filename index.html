<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тетрис с рекламой</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--tg-theme-bg-color, #111);
            font-family: sans-serif;
            color: var(--tg-theme-text-color, white);
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        .menu, .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 480px; /* чуть шире из-за next-поля */
            padding: 8px;
        }
        .menu.hidden, .game-wrapper.hidden {
            display: none;
        }
        .menu h1 {
            font-size: 48px;
            margin: 20px 0;
        }
        .menu button {
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 24px;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
        }

        /* Верхняя панель (уменьшенная) */
        .top-panel {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            width: 100%;
            gap: 6px;
            margin-bottom: 8px;
        }
        .info-block {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 4px 2px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-width: 0;
            backdrop-filter: blur(2px);
        }
        .info-label {
            font-size: 10px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #4CAF50);
            line-height: 1.2;
        }
        #pause-button {
            width: 100%;
            height: 100%;
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            border-radius: 10px;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            aspect-ratio: 1 / 1;
            padding: 0;
        }

        /* Контейнер: поле + next-фигура */
        .board-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
        }
        canvas#board {
            background: #000;
            border: 2px solid var(--tg-theme-hint-color, #555);
            width: 300px;
            height: 600px;
            touch-action: none;
        }
        .next-piece {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .next-label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.8;
        }
        canvas#nextCanvas {
            background: #000;
            border: 2px solid var(--tg-theme-hint-color, #555);
            width: 100px;
            height: 100px;
        }

        /* Модальные окна */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }
        .overlay.hidden {
            display: none;
        }
        .modal {
            background: var(--tg-theme-bg-color, #333);
            color: var(--tg-theme-text-color, white);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid var(--tg-theme-hint-color, #555);
            width: 280px;
            max-width: 90%;
        }
        .modal h2 {
            margin-top: 0;
        }
        .modal button {
            margin: 8px 0;
            width: 100%;
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .modal button:last-child {
            margin-bottom: 0;
        }

        /* Адаптация для очень маленьких экранов */
        @media (max-width: 440px) {
            .game-wrapper {
                max-width: 400px;
            }
            canvas#board {
                width: 250px;
                height: 500px;
            }
            canvas#nextCanvas {
                width: 80px;
                height: 80px;
            }
            .info-value {
                font-size: 16px;
            }
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Меню -->
    <div id="menu" class="menu">
        <h1>Тетрис</h1>
        <button id="play-button">Играть</button>
    </div>

    <!-- Игровой экран -->
    <div id="game-wrapper" class="game-wrapper hidden">
        <!-- Верхняя панель (уменьшенная) -->
        <div class="top-panel">
            <div class="info-block">
                <div class="info-label">SCORE</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-block">
                <div class="info-label">LVL</div>
                <div class="info-value" id="level">0</div>
            </div>
            <div class="info-block" style="padding: 0;">
                <button id="pause-button" title="Пауза">⏸</button>
            </div>
        </div>

        <!-- Поле + следующая фигура -->
        <div class="board-container">
            <canvas id="board" width="300" height="600"></canvas>
            <div class="next-piece">
                <div class="next-label">NEXT</div>
                <canvas id="nextCanvas" width="100" height="100"></canvas>
            </div>
        </div>
    </div>

    <!-- Модалка Game Over -->
    <div id="game-over" class="overlay hidden">
        <div class="modal">
            <h2>Игра окончена</h2>
            <p>Счёт: <span id="final-score"></span></p>
            <button id="watch-ad">Смотреть рекламу и продолжить</button>
            <button id="restart">Начать заново</button>
        </div>
    </div>

    <!-- Модалка паузы -->
    <div id="pause-menu" class="overlay hidden">
        <div class="modal">
            <h2>Пауза</h2>
            <button id="resume-button">Продолжить</button>
            <button id="exit-to-menu">Выйти в меню</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
