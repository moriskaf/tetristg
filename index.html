<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тетрис с рекламой</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background: var(--tg-theme-bg-color, #111);
            font-family: sans-serif;
            color: var(--tg-theme-text-color, white);
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        .menu, .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 480px;
            padding: 10px 5px 0 5px;
            margin-top: env(safe-area-inset-top, 0);
        }
        .menu.hidden, .game-wrapper.hidden {
            display: none;
        }

        /* ---------- Улучшенное меню ---------- */
        .menu {
            background: linear-gradient(145deg, 
                var(--tg-theme-bg-color, #1a1a2e) 0%, 
                color-mix(in srgb, var(--tg-theme-bg-color, #1a1a2e) 80%, black) 100%);
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu h1 {
            font-size: 64px;
            margin: 20px 0 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(135deg, 
                var(--tg-theme-button-color, #4CAF50) 0%, 
                color-mix(in srgb, var(--tg-theme-button-color, #4CAF50) 70%, white) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--tg-theme-button-color, #4CAF50);
            animation: glowPulse 2s infinite ease-in-out;
        }

        @keyframes glowPulse {
            0% { text-shadow: 0 0 20px var(--tg-theme-button-color, #4CAF50); }
            50% { text-shadow: 0 0 40px var(--tg-theme-button-color, #4CAF50); }
            100% { text-shadow: 0 0 20px var(--tg-theme-button-color, #4CAF50); }
        }

        .menu button {
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            width: auto;
            min-width: 250px;
            margin-top: 20px;
            box-shadow: 0 10px 0 color-mix(in srgb, var(--tg-theme-button-color, #4CAF50) 60%, black),
                        0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            animation: buttonPop 0.5s ease-out 0.3s both;
        }

        @keyframes buttonPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .menu button:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 color-mix(in srgb, var(--tg-theme-button-color, #4CAF50) 60%, black),
                        0 5px 15px rgba(0,0,0,0.3);
        }

        /* Добавим небольшую иконку или текст под кнопкой */
        .menu .subtitle {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 15px;
            letter-spacing: 1px;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        /* ---------- Игровой экран (без изменений) ---------- */
        .game-wrapper {
            /* стили игрового экрана (как в предыдущей версии) */
        }
        /* ... остальные стили игрового экрана ... */

        /* Контейнер поля и NEXT: поле строго по центру, NEXT справа */
        .board-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: start;
            width: 100%;
            gap: 0px;
        }
        canvas#board {
            grid-column: 2;
            background: #000;
            border: 2px solid var(--tg-theme-hint-color, #555);
            width: 300px;
            height: 600px;
            touch-action: none;
            justify-self: center;
        }
        .next-piece {
            grid-column: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 70px;
            margin-left: 8px;
        }
        .next-label {
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.8;
        }
        canvas#nextCanvas {
            background: #000;
            border: 2px solid var(--tg-theme-hint-color, #555);
            width: 70px;
            height: 70px;
        }

        /* Верхняя панель: SCORE и LVL по центру, пауза справа */
        .top-panel {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            height: 44px;
            margin-bottom: 5px;
        }
        .center-indicators {
            grid-column: 2;
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .info-block {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 4px 12px;
            text-align: center;
            backdrop-filter: blur(2px);
        }
        .info-label {
            font-size: 10px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #4CAF50);
            line-height: 1.2;
        }
        .pause-block {
            grid-column: 3;
            justify-self: end;
            display: flex;
            align-items: center;
        }
        #pause-button {
            width: 36px;
            height: 36px;
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
        }

        /* Панель управления: закруглённые кнопки с отступами */
        .controls {
            display: grid;
            grid-template-columns: 70px 70px 70px;
            grid-template-rows: 70px 70px;
            gap: 6px;
            justify-content: center;
            margin-top: 12px;
            margin-bottom: 5px;
        }
        .ctrl-btn {
            width: 100%;
            height: 100%;
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            border-radius: 16px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .ctrl-btn:active {
            opacity: 0.7;
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }
        #rotate {
            grid-column: 2;
            grid-row: 1;
        }
        #move-left {
            grid-column: 1;
            grid-row: 2;
        }
        #soft-drop {
            grid-column: 2;
            grid-row: 2;
        }
        #move-right {
            grid-column: 3;
            grid-row: 2;
        }

        /* Модальные окна (без изменений) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }
        .overlay.hidden {
            display: none;
        }
        .modal {
            background: var(--tg-theme-bg-color, #333);
            color: var(--tg-theme-text-color, white);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid var(--tg-theme-hint-color, #555);
            width: 280px;
            max-width: 90%;
        }
        .modal h2 {
            margin-top: 0;
        }
        .modal button {
            margin: 8px 0;
            width: 100%;
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, white);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .modal button:last-child {
            margin-bottom: 0;
        }

        /* Адаптация для узких экранов */
        @media (max-width: 460px) {
            .game-wrapper {
                max-width: 400px;
            }
            canvas#board {
                width: 250px;
                height: 500px;
            }
            .next-piece {
                width: 60px;
            }
            canvas#nextCanvas {
                width: 60px;
                height: 60px;
            }
            .controls {
                grid-template-columns: 60px 60px 60px;
                grid-template-rows: 60px 60px;
                gap: 5px;
            }
            .ctrl-btn {
                font-size: 28px;
                border-radius: 14px;
            }
            .info-value {
                font-size: 16px;
            }
            .menu h1 {
                font-size: 48px;
            }
            .menu button {
                font-size: 24px;
                padding: 15px 40px;
                min-width: 220px;
            }
        }
        @media (max-width: 360px) {
            canvas#board {
                width: 220px;
                height: 440px;
            }
            .next-piece {
                width: 50px;
            }
            canvas#nextCanvas {
                width: 50px;
                height: 50px;
            }
            .controls {
                grid-template-columns: 50px 50px 50px;
                grid-template-rows: 50px 50px;
                gap: 4px;
            }
            .ctrl-btn {
                font-size: 24px;
                border-radius: 12px;
            }
            .info-value {
                font-size: 14px;
            }
            .menu h1 {
                font-size: 40px;
            }
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Улучшенное меню -->
    <div id="menu" class="menu">
        <h1>ТЕТРИС</h1>
        <div class="subtitle">классическая игра</div>
        <button id="play-button">Играть</button>
    </div>

    <!-- Игровой экран (без изменений) -->
    <div id="game-wrapper" class="game-wrapper hidden">
        <!-- Верхняя панель -->
        <div class="top-panel">
            <div></div>
            <div class="center-indicators">
                <div class="info-block">
                    <div class="info-label">SCORE</div>
                    <div class="info-value" id="score">0</div>
                </div>
                <div class="info-block">
                    <div class="info-label">LVL</div>
                    <div class="info-value" id="level">0</div>
                </div>
            </div>
            <div class="pause-block">
                <button id="pause-button" title="Пауза">⏸</button>
            </div>
        </div>

        <!-- Поле + NEXT -->
        <div class="board-container">
            <canvas id="board" width="300" height="600"></canvas>
            <div class="next-piece">
                <div class="next-label">NEXT</div>
                <canvas id="nextCanvas" width="100" height="100"></canvas>
            </div>
        </div>

        <!-- Кнопки управления с закруглениями -->
        <div class="controls">
            <button class="ctrl-btn" id="rotate">↻</button>
            <button class="ctrl-btn" id="move-left">←</button>
            <button class="ctrl-btn" id="soft-drop">↓</button>
            <button class="ctrl-btn" id="move-right">→</button>
        </div>
    </div>

    <!-- Модалка Game Over -->
    <div id="game-over" class="overlay hidden">
        <div class="modal">
            <h2>Игра окончена</h2>
            <p>Счёт: <span id="final-score"></span></p>
            <button id="watch-ad">Смотреть рекламу и продолжить</button>
            <button id="restart">Начать заново</button>
        </div>
    </div>

    <!-- Модалка паузы -->
    <div id="pause-menu" class="overlay hidden">
        <div class="modal">
            <h2>Пауза</h2>
            <button id="resume-button">Продолжить</button>
            <button id="exit-to-menu">Выйти в меню</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
