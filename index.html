<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Тетрис с рекламой</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            /* Переменные темы (по умолчанию тёмная) */
            --bg-color: #111;
            --text-color: #fff;
            --hint-color: #555;
            --button-color: #4CAF50;
            --button-text: #fff;
            --pattern-color: 255, 255, 255; /* для паттерна */
            background: var(--bg-color);
            color: var(--text-color);
        }
        body.light-theme {
            --bg-color: #f0f0f0;
            --text-color: #222;
            --hint-color: #aaa;
            --button-color: #007aff;
            --button-text: #fff;
            --pattern-color: 0, 0, 0;
        }
        .screen-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100%;
        }
        .menu, .game-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 5px 0 5px;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            opacity: 1;
            visibility: visible;
        }
        .menu.hidden, .game-wrapper.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* ---------- Меню с паттерном ---------- */
        .menu {
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, 
                var(--bg-color) 0%, 
                color-mix(in srgb, var(--bg-color) 80%, black) 100%);
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .menu::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(45deg, rgba(var(--pattern-color), 0.02) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(var(--pattern-color), 0.02) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(var(--pattern-color), 0.02) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(var(--pattern-color), 0.02) 75%);
            background-size: 30px 30px;
            background-position: 0 0, 0 15px, 15px -15px, -15px 0px;
            pointer-events: none;
            z-index: 1;
        }
        .menu h1, .leaderboard-placeholder, .menu-buttons {
            position: relative;
            z-index: 2;
        }
        .menu h1 {
            font-size: 64px;
            margin: 20px 0 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(135deg, 
                var(--button-color) 0%, 
                color-mix(in srgb, var(--button-color) 70%, white) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--button-color);
            animation: glowPulse 2s infinite ease-in-out;
        }
        @keyframes glowPulse {
            0% { text-shadow: 0 0 20px var(--button-color); }
            50% { text-shadow: 0 0 40px var(--button-color); }
            100% { text-shadow: 0 0 20px var(--button-color); }
        }

        .leaderboard-placeholder {
            font-size: 18px;
            margin: 30px 0;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(255,255,255,0.1);
            padding: 12px 24px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            align-items: center;
            margin-top: auto;
            margin-bottom: 20px;
        }
        .menu button {
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            width: auto;
            min-width: 250px;
            box-shadow: 0 10px 0 color-mix(in srgb, var(--button-color) 60%, black),
                        0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }
        .menu button.small {
            font-size: 24px;
            padding: 12px 30px;
            min-width: 200px;
        }
        .menu button:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 color-mix(in srgb, var(--button-color) 60%, black),
                        0 5px 15px rgba(0,0,0,0.3);
        }

        /* ---------- Игровой экран ---------- */
        .top-panel {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            height: 44px;
            margin-bottom: 5px;
        }
        .center-indicators {
            grid-column: 2;
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .info-block {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 4px 12px;
            text-align: center;
            backdrop-filter: blur(2px);
        }
        .info-label {
            font-size: 10px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--button-color);
            line-height: 1.2;
        }
        .pause-block {
            grid-column: 3;
            justify-self: end;
            display: flex;
            align-items: center;
        }
        #pause-button {
            width: 36px;
            height: 36px;
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
        }
        .board-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: start;
            width: 100%;
            gap: 0px;
        }
        canvas#board {
            grid-column: 2;
            background: #000;
            border: 2px solid var(--hint-color);
            width: 300px;
            height: 600px;
            touch-action: none;
            justify-self: center;
        }
        .next-piece {
            grid-column: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 70px;
            margin-left: 8px;
            filter: drop-shadow(0 0 8px var(--button-color));
        }
        .next-label {
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.9;
            text-shadow: 0 0 5px currentColor;
            color: var(--button-color);
        }
        canvas#nextCanvas {
            background: #000;
            border: 2px solid var(--hint-color);
            width: 70px;
            height: 70px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            animation: nextAppear 0.2s ease-out;
        }
        @keyframes nextAppear {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .controls {
            display: grid;
            grid-template-columns: 70px 70px 70px;
            grid-template-rows: 70px 70px;
            gap: 6px;
            justify-content: center;
            margin-top: 12px;
            margin-bottom: 5px;
        }
        .ctrl-btn {
            width: 100%;
            height: 100%;
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 16px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: all 0.05s ease;
        }
        .ctrl-btn:active {
            opacity: 0.7;
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.2);
        }
        #rotate { grid-column: 2; grid-row: 1; }
        #move-left { grid-column: 1; grid-row: 2; }
        #soft-drop { grid-column: 2; grid-row: 2; }
        #move-right { grid-column: 3; grid-row: 2; }

        /* ---------- Модальные окна (с исправленным дизайном кнопок) ---------- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
            transition: opacity 0.2s ease;
        }
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .modal {
            background: var(--bg-color);
            color: var(--text-color);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid var(--hint-color);
            width: 280px;
            max-width: 90%;
        }
        .overlay:not(.hidden) .modal {
            animation: modalPop 0.2s ease-out;
        }
        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal h2 {
            margin-top: 0;
        }
        .modal button {
            margin: 8px 0;
            width: 100%;
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 color-mix(in srgb, var(--button-color) 60%, black);
            transition: all 0.05s ease;
        }
        .modal button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 color-mix(in srgb, var(--button-color) 60%, black);
        }
        .modal button:last-child {
            margin-bottom: 0;
        }

        /* ---------- Модалка настроек (те же стили) ---------- */
        .modal .setting-row {
            margin: 15px 0;
            text-align: left;
        }
        .modal .setting-row label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .modal .setting-row select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--hint-color);
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
        }
        .modal .theme-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .modal .theme-buttons button {
            flex: 1;
            margin: 0;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--hint-color);
            box-shadow: none;
        }
        .modal .theme-buttons button.active {
            background: var(--button-color);
            color: var(--button-text);
            border-color: var(--button-color);
        }
        .modal .save-btn {
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 0 color-mix(in srgb, var(--button-color) 60%, black);
        }
        .modal .save-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 color-mix(in srgb, var(--button-color) 60%, black);
        }

        /* Адаптация для узких экранов */
        @media (max-width: 460px) {
            .game-wrapper { max-width: 400px; }
            canvas#board { width: 250px; height: 500px; }
            .next-piece { width: 60px; }
            canvas#nextCanvas { width: 60px; height: 60px; }
            .controls { grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px; gap: 5px; }
            .ctrl-btn { font-size: 28px; border-radius: 14px; }
            .info-value { font-size: 16px; }
            .menu h1 { font-size: 48px; }
            .menu button { font-size: 24px; padding: 15px 40px; min-width: 220px; }
            .leaderboard-placeholder { font-size: 16px; padding: 10px 20px; }
        }
        @media (max-width: 360px) {
            canvas#board { width: 220px; height: 440px; }
            .next-piece { width: 50px; }
            canvas#nextCanvas { width: 50px; height: 50px; }
            .controls { grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px; gap: 4px; }
            .ctrl-btn { font-size: 24px; border-radius: 12px; }
            .info-value { font-size: 14px; }
            .menu h1 { font-size: 40px; }
            .leaderboard-placeholder { font-size: 14px; padding: 8px 16px; }
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="screen-container">
        <!-- Меню -->
        <div id="menu" class="menu">
            <h1>TETRIS W</h1>
            <div class="leaderboard-placeholder">LEADERBOARD</div>
            <div class="menu-buttons">
                <button id="play-button">PLAY</button>
                <button id="settings-button" class="small">⚙️ Settings</button>
            </div>
        </div>

        <!-- Игровой экран (скрыт) -->
        <div id="game-wrapper" class="game-wrapper hidden">
            <div class="top-panel">
                <div></div>
                <div class="center-indicators">
                    <div class="info-block">
                        <div class="info-label">SCORE</div>
                        <div class="info-value" id="score">0</div>
                    </div>
                    <div class="info-block">
                        <div class="info-label">LVL</div>
                        <div class="info-value" id="level">0</div>
                    </div>
                </div>
                <div class="pause-block">
                    <button id="pause-button" title="Пауза">⏸</button>
                </div>
            </div>

            <div class="board-container">
                <canvas id="board" width="300" height="600"></canvas>
                <div class="next-piece">
                    <div class="next-label">NEXT</div>
                    <canvas id="nextCanvas" width="100" height="100"></canvas>
                </div>
            </div>

            <div class="controls">
                <button class="ctrl-btn" id="rotate">↻</button>
                <button class="ctrl-btn" id="move-left">←</button>
                <button class="ctrl-btn" id="soft-drop">↓</button>
                <button class="ctrl-btn" id="move-right">→</button>
            </div>
        </div>
    </div>

    <!-- Модалка Game Over -->
    <div id="game-over" class="overlay hidden">
        <div class="modal">
            <h2>Игра окончена</h2>
            <p>Счёт: <span id="final-score"></span></p>
            <button id="watch-ad">Смотреть рекламу и продолжить</button>
            <button id="restart">Начать заново</button>
        </div>
    </div>

    <!-- Модалка паузы -->
    <div id="pause-menu" class="overlay hidden">
        <div class="modal">
            <h2>Пауза</h2>
            <button id="resume-button">Продолжить</button>
            <button id="exit-to-menu">Выйти в меню</button>
        </div>
    </div>

    <!-- Модалка настроек -->
    <div id="settings-modal" class="overlay hidden">
        <div class="modal">
            <h2>Настройки</h2>
            <div class="setting-row">
                <label>Тема</label>
                <div class="theme-buttons">
                    <button id="theme-light">Светлая</button>
                    <button id="theme-dark">Тёмная</button>
                    <button id="theme-system">Системная</button>
                </div>
            </div>
            <div class="setting-row">
                <label>Сложность</label>
                <select id="difficulty-select">
                    <option value="easy">Лёгкая</option>
                    <option value="normal" selected>Средняя</option>
                    <option value="hard">Сложная</option>
                </select>
            </div>
            <button id="save-settings" class="save-btn">Сохранить</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
